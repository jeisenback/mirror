name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dev requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Install prototype requirements
        run: |
          if [ -f examples/prototype/requirements.txt ]; then pip install -r examples/prototype/requirements.txt; fi

      - name: Run pytest
        run: |
          pytest -q

      - name: Run prototype unit scenarios
        run: |
          python -u examples/prototype/tests/run_tests.py
          python -u examples/prototype/tests/run_product_tests.py

      - name: Redis smoke test (async)
        env:
          REDIS_URL: redis://redis:6379/0
        run: |
          python -u examples/prototype/tests/run_redis_smoke.py

      - name: Emit docs node artifact
        run: |
          python examples/prototype/docs/hooks/emit_node.py > artifact_node.json || true
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-node
          path: artifact_node.json
      - name: Generate docs (tools/gen_docs.py)
        run: |
          python tools/gen_docs.py

      - name: Validate docs links
        run: |
          python tools/check_links.py docs/auto

      - name: Set up Node.js (for markdownlint)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run markdownlint on generated docs
        run: |
          npm install -g markdownlint-cli@0.33.0
          markdownlint "docs/auto/**/*.md"

      - name: Archive generated docs
        run: |
          if [ -d docs/auto ]; then zip -r docs_auto.zip docs/auto; fi

      - name: Upload generated docs ZIP
        uses: actions/upload-artifact@v4
        with:
          name: docs-auto-zip
          path: docs_auto.zip

      - name: Validate traces
        run: |
          python tools/validate_traces.py

  deploy_pages:
    name: Build and deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install mkdocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Generate docs (tools/gen_docs.py)
        run: |
          python tools/gen_docs.py

      - name: Ensure docs index
        run: |
          mkdir -p docs/auto
          if [ ! -f docs/auto/index.md ]; then echo "# Documentation\n\nGenerated docs." > docs/auto/index.md; fi

      - name: Build site
        run: |
          mkdocs build --site-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

  verify_pages:
    name: Verify built Pages site
    runs-on: ubuntu-latest
    needs: deploy_pages
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install mkdocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Generate docs (tools/gen_docs.py)
        run: |
          python tools/gen_docs.py

      - name: Build site
        run: |
          mkdocs build --site-dir site

      - name: Verify site index contains expected title
        run: |
          if grep -q "Prototype Documentation" site/index.html; then echo "Found title"; else echo "Missing expected title in site/index.html" && exit 1; fi
